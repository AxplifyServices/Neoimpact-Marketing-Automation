stages:
  - build
  - update-deployment

variables:
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  DOCKER_IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest
  DEPLOYMENT_REPO: "https://gitlab.com/swiftnova/clusters/production/applications.git"
  VALUES_FILE_PATH: "services/campain/values.yaml"

build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_TLS_VERIFY: 1
    DOCKER_CERT_PATH: "$DOCKER_TLS_CERTDIR/client"
  timeout: 10m
  before_script:
    - echo "Building for ARM64 architecture"
    - |
      TIMEOUT=60
      ELAPSED=0
      until docker info >/dev/null 2>&1; do
        if [ $ELAPSED -ge $TIMEOUT ]; then
          echo "ERROR: Docker daemon failed to start after ${TIMEOUT}s"
          echo "DinD container likely needs privileged mode enabled in runner config"
          exit 1
        fi
        echo "Waiting for docker daemon... (${ELAPSED}s/${TIMEOUT}s)"
        sleep 2
        ELAPSED=$((ELAPSED + 2))
      done
      echo "Docker daemon ready"
    - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
  script:
    - docker build -t $DOCKER_IMAGE -t $DOCKER_IMAGE_LATEST .
    - docker push $DOCKER_IMAGE
    - docker push $DOCKER_IMAGE_LATEST
    - echo "Docker image built and pushed successfully"
    - echo "Image tag SHA $CI_COMMIT_SHORT_SHA"
    - echo "Image tag latest"
  only:
    - main

update-deployment:
  stage: update-deployment
  image: alpine:latest
  before_script:
    - apk add --no-cache git yq
    - git config --global user.email "ci@swiftnova.ma"
    - git config --global user.name "GitLab CI/CD"
  script:
    - echo "Updating deployment repository with new image tag"
    - git clone https://oauth2:${GITLAB_PAT}@gitlab.com/swiftnova/clusters/production/applications.git deployment-repo
    - cd deployment-repo
    - yq eval ".image.tag = \"$CI_COMMIT_SHORT_SHA\"" -i $VALUES_FILE_PATH
    - echo "Updated values.yaml"
    - cat $VALUES_FILE_PATH | grep -A 3 "image"
    - git add $VALUES_FILE_PATH
    - git commit -m "chore(campain) update image tag to $CI_COMMIT_SHORT_SHA" || echo "No changes to commit"
    - git push origin main
    - echo "Deployment values updated successfully"
  only:
    - main
  needs:
    - build
  environment:
    name: production
    url: https://campain.swiftnova.ma

